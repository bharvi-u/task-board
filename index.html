<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board | Trello Clone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>📋 Task Board</h1>
            <button id="addListBtn" class="btn-primary">+ Add List</button>
        </header>

        <div class="board" id="board">
            <!-- Lists will be added here dynamically -->
        </div>
    </div>

    <!-- Modal for adding/editing tasks -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Task Details</h3>
            <input type="text" id="taskTitle" placeholder="Task title...">
            <textarea id="taskDesc" placeholder="Description..."></textarea>
            <button id="saveTaskBtn">Save Task</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
